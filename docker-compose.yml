version: "3.9"

# ── ClearMark — Full stack ─────────────────────────────────────────────────────
# Starts: Redis, FastAPI server, Celery worker
#
# Usage:
#   docker compose up --build          # start everything
#   docker compose up --build -d       # detached
#   docker compose logs -f worker      # tail worker logs
#
# Override any setting via .env file (copy .env.example → .env)

services:

  # ── Redis (broker + result backend) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI server ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - API_BASE_URL=${API_BASE_URL:-http://localhost:8000}
    volumes:
      - storage_data:/app/storage_root
      - ./models:/app/models:ro     # LaMa weights (read-only mount)
    depends_on:
      redis:
        condition: service_healthy
    command: >
      uvicorn api.main:app
        --host 0.0.0.0
        --port 8000
        --workers 2
        --log-level info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Celery worker ──────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
    volumes:
      - storage_data:/app/storage_root
      - ./models:/app/models:ro
    depends_on:
      redis:
        condition: service_healthy
    command: >
      celery -A workers.tasks.celery_app worker
        --loglevel=info
        --concurrency=2
        --max-tasks-per-child=50
        -Q celery
    deploy:
      resources:
        limits:
          memory: 4G       # guard against OOM on AI track

  # ── Celery Flower (monitoring UI — optional) ────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
    command: >
      celery -A workers.tasks.celery_app flower
        --port=5555
        --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-clearmark}
    profiles:
      - monitoring    # start with: docker compose --profile monitoring up

volumes:
  redis_data:
  storage_data:
